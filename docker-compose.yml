services:
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "corepack enable && corepack prepare pnpm@11.1.2 --activate && pnpm install && pnpm start -- --host 0.0.0.0"
    profiles:
      - dev

  prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: serve
    ports:
      - "3000:3000"
    profiles:
      - prod
