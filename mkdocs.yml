site_name: Juan Felipe Gomez | Staff Software Engineer
site_url: https://juanfe2793.github.io/JuanPipe/
site_description: Professional Portfolio and Technical Blog of Juan Felipe Gomez, Staff Software Engineer.

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/juanfe2793
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/juangomez27
    - icon: fontawesome/solid/envelope
      link: mailto:juangomeztic27@gmail.com

plugins:
  - search
  - blog:
      blog_dir: blog
      post_excerpt: required
  - exclude:
      glob:
        - "utils/aws-scripts/**"

nav:
  - Home: index.md
  - Portfolio:
    - About Me: portfolio/about.md
    - CV / Resume: portfolio/cv.md
  - Blog:
    - blog/index.md
  - Technical Guides:
    - index: guides/index.md
    - Bash Profile: guides/bash_profile.md
    - Carvel: guides/carvel_commands.md
    - Docker & Containerd: guides/docker_containerd_commands.md
    - Git: guides/git_commands.md
    - Helm: guides/helm_commands.md
    - Kubectl: guides/kubectl_commands.md
    - Linux: guides/linux_commands.md
    - SaltStack: guides/saltstack_commands.md
