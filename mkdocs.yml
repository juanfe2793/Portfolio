site_name: Juan Felipe Gomez | Staff Software Engineer
site_url: https://juanfe2793.github.io/JuanPipe/
site_description: Professional Portfolio and Technical Blog of Juan Felipe Gomez, Staff Software Engineer.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - blog:
      blog_dir: blog
      post_excerpt: required
  - exclude:
      glob:
        - "utils/aws-scripts/**"

nav:
  - Home: index.md
  - Portfolio:
    - About Me: portfolio/about.md
    - CV / Resume: portfolio/cv.md
  - Blog:
    - blog/index.md
  - Technical Guides:
    - index: guides/index.md
    - Bash Profile: guides/bash_profile.md
    - Carvel: guides/carvel_commands.md
    - Docker & Containerd: guides/docker_containerd_commands.md
    - Git: guides/git_commands.md
    - Helm: guides/helm_commands.md
    - Kubectl: guides/kubectl_commands.md
    - Linux: guides/linux_commands.md
    - SaltStack: guides/saltstack_commands.md
